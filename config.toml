[generator]
prefix_article_probability = 0.2
prefix_probability = 0.8
suffix_article_probability = 0.3
suffix_adjectiv_probability = 0.5
suffix_name_probability = 0.5
separator = " "
fillword = "of"

[db]
path = "data/words.db"

# Schrift der find-Ausgabe: latin (Standard) | native | both
# latin: nicht-lateinische Woerter erscheinen romanisiert (kaikki-Romanisierung,
#        sonst regelbasierte Transliteration); die Originalform bleibt im
#        TTY-Block sichtbar.
# count: Standard-Anzahl der find-Ergebnisse, wenn --count fehlt.
[output]
script = "latin"
count = 9
